<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вольная ставка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }
        .card {
            width: 320px;
            height: 480px;
            border-radius: 24px;
            padding: 20px 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #050a1a 0%, #0f1f4a 40%, #1a3a7a 100%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 60px rgba(30, 60, 180, 0.2);
            border: 2px solid rgba(80, 140, 255, 0.15);
        }
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
            z-index: 1;
        }
        .star {
            position: absolute;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: sparkle 3s infinite alternate ease-in-out;
        }
        @keyframes sparkle {
            0% { transform: scale(0.9) rotate(0deg); opacity: 0.4; }
            100% { transform: scale(1.4) rotate(180deg); opacity: 1; }
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.8);
        }

        .card-title {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #8ac4ff 0%, #4a8aff 60%, #1a5ac0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(60, 140, 255, 0.15);
            line-height: 1.2;
            margin-top: 0;
            padding-top: 10px;
        }

        .card-effect {
            font-size: 18px;
            font-weight: 300;
            color: #c0d8ff;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.9);
            padding-bottom: 20px;
            max-width: 90%;
        }
    </style>
</head>
<body>

<div class="card">

    <!-- ЗВЁЗДЫ: 30 штук -->
    <div class="stars">
        <!-- Полупрозрачные (мелкие) -->
        <div class="star" style="top:8%; left:5%; width:14px; height:14px; opacity:0.3;"></div>
        <div class="star" style="top:18%; right:6%; width:16px; height:16px; opacity:0.2;"></div>
        <div class="star" style="top:30%; left:4%; width:12px; height:12px; opacity:0.25;"></div>
        <div class="star" style="top:45%; right:3%; width:18px; height:18px; opacity:0.2;"></div>
        <div class="star" style="top:58%; left:7%; width:14px; height:14px; opacity:0.3;"></div>
        <div class="star" style="top:72%; right:5%; width:16px; height:16px; opacity:0.2;"></div>
        <div class="star" style="top:85%; left:6%; width:12px; height:12px; opacity:0.25;"></div>
        <div class="star" style="top:12%; left:45%; width:14px; height:14px; opacity:0.2;"></div>
        <div class="star" style="top:40%; left:55%; width:16px; height:16px; opacity:0.3;"></div>
        <div class="star" style="top:65%; left:35%; width:12px; height:12px; opacity:0.2;"></div>
        <div class="star" style="top:22%; left:75%; width:14px; height:14px; opacity:0.25;"></div>
        <div class="star" style="top:55%; left:85%; width:16px; height:16px; opacity:0.2;"></div>
        <div class="star" style="top:38%; left:22%; width:12px; height:12px; opacity:0.3;"></div>
        <div class="star" style="top:80%; left:65%; width:14px; height:14px; opacity:0.2;"></div>
        <div class="star" style="top:5%; left:88%; width:16px; height:16px; opacity:0.25;"></div>

        <!-- Белые (крупные, яркие) -->
        <div class="star" style="top:5%; left:20%; width:28px; height:28px; opacity:0.9;"></div>
        <div class="star" style="top:15%; right:12%; width:34px; height:34px; opacity:0.95;"></div>
        <div class="star" style="top:28%; left:10%; width:26px; height:26px; opacity:0.85;"></div>
        <div class="star" style="top:42%; right:2%; width:38px; height:38px; opacity:0.9;"></div>
        <div class="star" style="top:55%; left:4%; width:30px; height:30px; opacity:0.95;"></div>
        <div class="star" style="top:68%; right:8%; width:32px; height:32px; opacity:0.85;"></div>
        <div class="star" style="top:82%; left:12%; width:28px; height:28px; opacity:0.9;"></div>
        <div class="star" style="top:10%; left:55%; width:36px; height:36px; opacity:0.8;"></div>
        <div class="star" style="top:35%; left:70%; width:30px; height:30px; opacity:0.9;"></div>
        <div class="star" style="top:60%; left:50%; width:34px; height:34px; opacity:0.85;"></div>
        <div class="star" style="top:20%; left:85%; width:28px; height:28px; opacity:0.95;"></div>
        <div class="star" style="top:48%; left:15%; width:32px; height:32px; opacity:0.8;"></div>
        <div class="star" style="top:75%; left:40%; width:36px; height:36px; opacity:0.9;"></div>
        <div class="star" style="top:8%; left:70%; width:30px; height:30px; opacity:0.85;"></div>
        <div class="star" style="top:50%; left:45%; width:34px; height:34px; opacity:0.95;"></div>
    </div>

    <div class="card-content">
        <div class="card-title">Вольная<br>ставка</div>
        <div class="card-effect">Даёт возможность сходить картой без условий</div>
    </div>

</div>

</body>
</html>
