<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Симметричные точки — разное количество</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 20px;
        }
        .card {
            width: 200px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            border: none;
            flex-shrink: 0;
            border-radius: 20px;
            background: #1a1a1a;
        }
        .grid-cards {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 16px 10px;
            gap: 4px;
            z-index: 2;
            pointer-events: none;
        }
        .card-slot {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            position: relative;
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
            overflow: hidden;
            display: grid;
            place-items: center;
        }
        .card-slot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2));
            pointer-events: none;
            z-index: 1;
        }
        .center-slot {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transform: translateY(-2px) scale(1.02);
        }

        /* ===== СИММЕТРИЧНАЯ СЕТКА ТОЧЕК ===== */
        .dot-grid {
            display: grid;
            gap: 6px;
            width: 80%;
            height: 80%;
            z-index: 0;
            position: relative;
        }
        .dot-cell {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .dot {
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0.2;
        }

        .label {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 10px;
            white-space: nowrap;
            font-family: 'Segoe UI', Arial, sans-serif;
        }
    </style>
</head>
<body>

<script>
    // ===== НАСТРОЙКИ =====
    const variants = [
        { cols: 1, rows: 1, label: '1×1' },
        { cols: 2, rows: 2, label: '2×2' },
        { cols: 3, rows: 2, label: '3×2' },
        { cols: 3, rows: 3, label: '3×3' },
        { cols: 4, rows: 3, label: '4×3' },
        { cols: 4, rows: 4, label: '4×4' },
        { cols: 5, rows: 4, label: '5×4' },
        { cols: 5, rows: 5, label: '5×5' },
        { cols: 6, rows: 5, label: '6×5' },
        { cols: 6, rows: 6, label: '6×6' },
        { cols: 7, rows: 6, label: '7×6' },
        { cols: 7, rows: 7, label: '7×7' }
    ];

    const container = document.body;

    variants.forEach((v) => {
        // Создаём карту
        const card = document.createElement('div');
        card.className = 'card';

        // Сетка карт
        const grid = document.createElement('div');
        grid.className = 'grid-cards';

        for (let i = 0; i < 9; i++) {
            const slot = document.createElement('div');
            slot.className = 'card-slot';
            if (i === 4) slot.classList.add('center-slot');

            // Создаём симметричную сетку точек внутри слота
            const dotGrid = document.createElement('div');
            dotGrid.className = 'dot-grid';
            dotGrid.style.gridTemplateColumns = `repeat(${v.cols}, 1fr)`;
            dotGrid.style.gridTemplateRows = `repeat(${v.rows}, 1fr)`;

            for (let r = 0; r < v.rows; r++) {
                for (let c = 0; c < v.cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'dot-cell';
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    // Центральные точки чуть ярче
                    const cx = (v.cols - 1) / 2;
                    const cy = (v.rows - 1) / 2;
                    const dist = Math.hypot(c - cx, r - cy);
                    const maxDist = Math.hypot(v.cols/2, v.rows/2);
                    const brightness = 0.15 + 0.25 * (1 - dist / maxDist);
                    dot.style.opacity = brightness;
                    cell.appendChild(dot);
                    dotGrid.appendChild(cell);
                }
            }

            slot.appendChild(dotGrid);
            grid.appendChild(slot);
        }

        card.appendChild(grid);

        // Подпись
        const label = document.createElement('span');
        label.className = 'label';
        label.textContent = `${v.cols}×${v.rows} = ${v.cols * v.rows} точек`;
        card.appendChild(label);

        container.appendChild(card);
    });
</script>

</body>
</html>
