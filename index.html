<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>15 градиентов с точками — оттенок 12</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 24px;
        }
        .card {
            width: 200px;
            height: 320px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0,0,0,0.6);
            border: none;
            flex-shrink: 0;
            border-radius: 20px;
            background: #262626;
        }
        .dots-layer {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .dot {
            position: absolute;
            border-radius: 50%;
            background: white;
        }
        .grid-cards {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 18px 12px;
            gap: 4px;
            z-index: 2;
            pointer-events: none;
        }
        .card-slot {
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.04);
        }
        .card-slot::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 8px;
            background: linear-gradient(145deg, rgba(255,255,255,0.02), rgba(0,0,0,0.2));
            pointer-events: none;
        }
        .center-slot {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
            box-shadow: 0 4px 16px rgba(0,0,0,0.5);
            transform: translateY(-3px) scale(1.02);
        }
        .label {
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 3;
            font-size: 8px;
            color: rgba(255,255,255,0.3);
            background: rgba(0,0,0,0.4);
            padding: 2px 10px;
            border-radius: 10px;
            white-space: nowrap;
            font-family: 'Segoe UI', Arial, sans-serif;
            letter-spacing: 0.3px;
        }

        /* ===== 15 ГРАДИЕНТОВ С ТОЧКАМИ ===== */
        /* 1 — мелкие точки по всей карте */
        .g1 .dot { width: 2px; height: 2px; opacity: 0.15; }
        /* 2 — крупные точки, редко */
        .g2 .dot { width: 6px; height: 6px; opacity: 0.1; }
        /* 3 — смесь мелких и крупных */
        .g3 .dot { opacity: 0.12; }
        .g3 .dot:nth-child(3n) { width: 5px; height: 5px; }
        .g3 .dot:nth-child(3n+1) { width: 2px; height: 2px; }
        .g3 .dot:nth-child(3n+2) { width: 3px; height: 3px; }
        /* 4 — точки только в центре (скопление) */
        .g4 .dot { width: 3px; height: 3px; opacity: 0.12; }
        /* 5 — точки по краям (периметр) */
        .g5 .dot { width: 3px; height: 3px; opacity: 0.12; }
        /* 6 — диагональный градиент точек (слева-сверху → справа-снизу) */
        .g6 .dot { width: 3px; height: 3px; opacity: 0.1; }
        /* 7 — радиальный градиент (центр → края) */
        .g7 .dot { width: 3px; height: 3px; opacity: 0.1; }
        /* 8 — хаотичные точки разного размера */
        .g8 .dot { opacity: 0.1; }
        .g8 .dot:nth-child(2n) { width: 4px; height: 4px; }
        .g8 .dot:nth-child(3n) { width: 2px; height: 2px; }
        /* 9 — точки только в углах */
        .g9 .dot { width: 3px; height: 3px; opacity: 0.1; }
        /* 10 — линии из точек (вертикальные) */
        .g10 .dot { width: 2px; height: 2px; opacity: 0.08; }
        /* 11 — точки с разной прозрачностью (градиент прозрачности) */
        .g11 .dot { width: 3px; height: 3px; }
        /* 12 — крупные точки по центру, мелкие по краям */
        .g12 .dot { opacity: 0.08; }
        .g12 .dot:nth-child(4n) { width: 5px; height: 5px; opacity: 0.15; }
        .g12 .dot:nth-child(4n+1) { width: 2px; height: 2px; }
        .g12 .dot:nth-child(4n+2) { width: 3px; height: 3px; }
        .g12 .dot:nth-child(4n+3) { width: 2px; height: 2px; }
        /* 13 — редкие крупные точки */
        .g13 .dot { width: 5px; height: 5px; opacity: 0.07; }
        /* 14 — точки разбросаны группами */
        .g14 .dot { width: 3px; height: 3px; opacity: 0.08; }
        /* 15 — множество мелких точек (звёздное небо) */
        .g15 .dot { width: 1.5px; height: 1.5px; opacity: 0.1; }
    </style>
</head>
<body>

<!-- ===== ГЕНЕРАЦИЯ 15 КАРТ ===== -->
<script>
    const variants = [
        { id: 'g1', count: 120, label: 'мелкие точки' },
        { id: 'g2', count: 40, label: 'крупные точки' },
        { id: 'g3', count: 100, label: 'смесь размеров' },
        { id: 'g4', count: 80, label: 'центр' },
        { id: 'g5', count: 80, label: 'края' },
        { id: 'g6', count: 90, label: 'диагональ' },
        { id: 'g7', count: 90, label: 'радиал' },
        { id: 'g8', count: 100, label: 'хаос' },
        { id: 'g9', count: 60, label: 'углы' },
        { id: 'g10', count: 120, label: 'вертикаль' },
        { id: 'g11', count: 90, label: 'прозрачность' },
        { id: 'g12', count: 100, label: 'центр-края' },
        { id: 'g13', count: 30, label: 'редкие' },
        { id: 'g14', count: 80, label: 'группы' },
        { id: 'g15', count: 200, label: 'звёздное небо' }
    ];

    const container = document.body;

    variants.forEach((v, idx) => {
        const card = document.createElement('div');
        card.className = `card ${v.id}`;

        const dotsLayer = document.createElement('div');
        dotsLayer.className = 'dots-layer';

        // Генерация точек
        for (let i = 0; i < v.count; i++) {
            const dot = document.createElement('div');
            dot.className = 'dot';
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            dot.style.left = x + '%';
            dot.style.top = y + '%';

            // Для разных вариантов — свои модификации
            if (v.id === 'g4') {
                // центр: точки ближе к центру
                const cx = 50, cy = 50;
                const dist = Math.hypot(x - cx, y - cy);
                if (dist > 30) { dot.style.display = 'none'; }
            }
            if (v.id === 'g5') {
                // края: точки ближе к краям
                const cx = 50, cy = 50;
                const dist = Math.hypot(x - cx, y - cy);
                if (dist < 30) { dot.style.display = 'none'; }
            }
            if (v.id === 'g6') {
                // диагональ: плотность выше на диагонали
                const diag = (x + y) / 2;
