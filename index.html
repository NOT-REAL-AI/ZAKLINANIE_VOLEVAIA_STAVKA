<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нереальные карты</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-wrap: wrap;
            gap: 50px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 40px;
        }

        .card {
            width: 320px;
            height: 480px;
            border-radius: 24px;
            padding: 30px 24px 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a2a6a 50%, #2b4a8a 100%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 60px rgba(30, 60, 180, 0.3);
            border: 2px solid rgba(100, 160, 255, 0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.03);
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.25;
            animation: sparkle 3s infinite alternate ease-in-out;
        }
        @keyframes sparkle {
            0% { opacity: 0.15; transform: scale(0.9) rotate(0deg); }
            100% { opacity: 0.5; transform: scale(1.3) rotate(180deg); }
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        }

        .card-title {
            font-size: 40px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #a0d0ff 0%, #4a8aff 50%, #1a5ac0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(60, 140, 255, 0.3);
            margin-top: 30px;
            line-height: 1.2;
        }

        .card-effect {
            font-size: 20px;
            font-weight: 300;
            color: #c0d8ff;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 25px;
            max-width: 90%;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        .card-rarity {
            font-size: 14px;
            letter-spacing: 2px;
            color: #ffd700;
            text-transform: uppercase;
            background: rgba(255, 215, 0, 0.08);
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            margin-top: auto;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <!-- ===== ВОЛЬНАЯ СТАВКА ===== -->
