
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Заклинания — 53 карты</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a12;
            display: flex;
            flex-wrap: wrap;
            gap: 14px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 14px;
        }

        .card {
            width: 210px;
            height: 330px;
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 0 16px;
            flex-shrink: 0;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .pattern {
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            opacity: 0.2;
            background: 
                repeating-linear-gradient(57.5deg, #ffffff 0px, #ffffff 1.5px, transparent 1.5px, transparent 16px),
                repeating-linear-gradient(-57.5deg, #ffffff 0px, #ffffff 1.5px, transparent 1.5px, transparent 16px);
        }

        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 12px;
            background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(0,0,0,0.1));
            pointer-events: none;
            z-index: 1;
        }

        .card-name {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 23px;
            font-weight: 800;
            color: #ffffff;
            text-align: center;
            line-height: 1.2;
            font-family: Arial, sans-serif;
            padding: 10px 16px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.2);
            max-width: 95%;
            width: auto;
            min-width: 60%;
            text-shadow: 0 2px 8px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(2px);
            display: inline-block;
            white-space: nowrap;
            background: rgba(255,255,255,0.08);
        }

        .card-effect {
            position: absolute;
            top: 255px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2;
            font-size: 11px;
            font-weight: 500;
            color: #ffffff;
            text-align: center;
            padding: 8px 14px;
            border-radius: 6px;
            max-width: 95%;
            width: 100%;
            line-height: 1.3;
            text-shadow: 0 1px 6px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
            backdrop-filter: blur(2px);
            min-height: 42px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(255,255,255,0.06);
        }

        .card-effect .line1,
        .card-effect .line2 {
            display: block;
            width: 100%;
            text-align: center;
        }

        .label {
            position: absolute;
            top: 307px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 5;
            font-size: 10.4px;
            font-weight: 700;
            letter-spacing: 1.5px;
            background: transparent;
            padding: 0;
            border-radius: 0;
            white-space: nowrap;
            font-family: Arial, sans-serif;
            text-transform: uppercase;
        }

        .rare-none { background: #00224a; }
        .rare-none .card-name { background: rgba(255,255,255,0.08); }
        .rare-none .card-effect { background: rgba(255,255,255,0.06); }
        .rare-none .label { color: rgba(255,255,255,0.25); }

        .rare-legend { background: #ffcc00; }
        .rare-legend .card-name { background: rgba(255,255,255,0.12); color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .rare-legend .card-effect { background: rgba(255,255,255,0.08); color: #ffffff; text-shadow: 0 1px 6px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); }
        .rare-legend .label { color: rgba(255,255,255,0.25); }

        .rare-myth { background: #b30000; }
        .rare-myth .card-name { background: rgba(255,255,255,0.08); }
        .rare-myth .card-effect { background: rgba(255,255,255,0.06); }
        .rare-myth .label { color: rgba(255,255,255,0.25); }

        .rare-epic { background: #7f00c0; }
        .rare-epic .card-name { background: rgba(255,255,255,0.08); }
        .rare-epic .card-effect { background: rgba(255,255,255,0.06); }
        .rare-epic .label { color: rgba(255,255,255,0.25); }

        .rare-rare { background: #0037c1; }
        .rare-rare .card-name { background: rgba(255,255,255,0.08); }
        .rare-rare .card-effect { background: rgba(255,255,255,0.06); }
        .rare-rare .label { color: rgba(255,255,255,0.25); }

        .rare-common { background: #b1b1b1; }
        .rare-common .card-name { background: rgba(255,255,255,0.15); color: #ffffff; text-shadow: 0 2px 8px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); }
        .rare-common .card-effect { background: rgba(255,255,255,0.10); color: #ffffff; text-shadow: 0 1px 6px rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.08); }
        .rare-common .label { color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<script>
    function splitIntoTwoLines(text) {
        const words = text.split(' ');
        if (words.length === 1) {
            const mid = Math.ceil(text.length / 2);
            return [text.slice(0, mid + 1), text.slice(mid + 1)];
        }
        let bestSplit = Math.ceil(words.length / 2);
        let bestDiff = Infinity;
        for (let i = Math.ceil(words.length / 2); i < words.length; i++) {
            const firstLen = words.slice(0, i).join(' ').length;
            const secondLen = words.slice(i).join(' ').length;
            const diff = Math.abs(firstLen - secondLen);
            if (diff < bestDiff && firstLen >= secondLen) {
                bestDiff = diff;
                bestSplit = i;
            }
        }
        return [words.slice(0, bestSplit).join(' '), words.slice(bestSplit).join(' ')];
    }

    const spells = [
        // Нереальные (по 1)
        { name: 'Вольная ставка', rarity: 'Нереальная', cls: 'rare-none', effect: 'Поставь любую карту без условий', count: 1 },
        { name: 'Двойной ход', rarity: 'Нереальная', cls: 'rare-none', effect: 'Сделай 2 хода подряд', count: 1 },

        // Легендарные (по 2)
        { name: 'Эхо', rarity: 'Легендарная', cls: 'rare-legend', effect: 'Забери заклинание в последнем круге себе', count: 2 },
        { name: 'Подмена', rarity: 'Легендарная', cls: 'rare-legend', effect: 'Забери карту с поля, положи свою на её место', count: 2 },

        // Мифические (по 3)
        { name: 'Маскировка', rarity: 'Мифическая', cls: 'rare-myth', effect: 'Сделай цифру на поле любой на 1 ход', count: 3 },
        { name: 'Немой', rarity: 'Мифическая', cls: 'rare-myth', effect: 'Соперник без заклинаний 2 круга', count: 3 },
        { name: 'Адаптация', rarity: 'Мифическая', cls: 'rare-myth', effect: 'Сделай карту в руке любой позиции на 1 ход', count: 3 },

        // Эпические (по 4)
        { name: 'Перезарядка', rarity: 'Эпическая', cls: 'rare-epic', effect: 'Сбрось это заклинание, возьми два новых', count: 4 },
        { name: 'Пересдача', rarity: 'Эпическая', cls: 'rare-epic', effect: 'Положи любую карту вниз стопки, возьми новую', count: 4 },
        { name: 'Фантом', rarity: 'Эпическая', cls: 'rare-epic', effect: 'Карта в руке = любая цифра на 1 ход', count: 4 },
        { name: 'Сокрытие', rarity: 'Эпическая', cls: 'rare-epic', effect: 'Скрой карту на поле на 1 ход', count: 4 },
        { name: 'Поправка', rarity: 'Эпическая', cls: 'rare-epic', effect: 'Измени цифру на ±1 на 1 ход', count: 4 },

        // Редкие (по 4)
        { name: 'Блокировка', rarity: 'Редкая', cls: 'rare-rare', effect: 'Заблокируй 3 поля на 2 круга', count: 4 },
        { name: 'Щит', rarity: 'Редкая', cls: 'rare-rare', effect: 'Защита от заклинаний на 2 круга', count: 4 },
        { name: 'Обмен', rarity: 'Редкая', cls: 'rare-rare', effect: 'Поменяй местами два ребра или два угла на 1 ход', count: 4 },
        { name: 'Проверка', rarity: 'Редкая', cls: 'rare-rare', effect: 'Просмотри 2 лучших заклинания у всех', count: 4 },

        // Обычная (по 2)
        { name: 'Пустышка', rarity: 'Обычная', cls: 'rare-common', effect: 'Ничего не делает. Ха-ха!', count: 2 }
    ];

    let total = 0;
    spells.forEach(spell => {
        for (let i = 0; i < spell.count; i++) {
            const card = document.createElement('div');
            card.className = `card ${spell.cls}`;

            const pattern = document.createElement('div');
            pattern.className = 'pattern';
            card.appendChild(pattern);

            const name = document.createElement('div');
            name.className = 'card-name';
            name.textContent = spell.name;
            card.appendChild(name);

            const effect = document.createElement('div');
            effect.className = 'card-effect';
            const lines = splitIntoTwoLines(spell.effect);
            const line1 = document.createElement('span');
            line1.className = 'line1';
            line1.textContent = lines[0];
            const line2 = document.createElement('span');
            line2.className = 'line2';
            line2.textContent = lines[1];
            effect.appendChild(line1);
            effect.appendChild(line2);
            card.appendChild(effect);

            const label = document.createElement('div');
            label.className = 'label';
            label.textContent = spell.rarity;
            card.appendChild(label);

            document.body.appendChild(card);
            total++;
        }
    });

    console.log(`✅ Сгенерировано ${total} карт заклинаний`);
</script>

</body>
</html>
