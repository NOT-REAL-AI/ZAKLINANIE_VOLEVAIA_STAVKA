<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вольная ставка</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .card {
            width: 320px;
            height: 480px;
            border-radius: 24px;
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a2a6a 50%, #2b4a8a 100%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 60px rgba(30, 60, 180, 0.3);
            border: 2px solid rgba(100, 160, 255, 0.3);
        }

        /* ЗВЁЗДЫ (ромбы) */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.6;
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.7);
            animation: sparkle 2s infinite alternate ease-in-out;
        }

        .star:nth-child(1) { top: 12%; left: 8%; width: 14px; height: 14px; animation-delay: 0.0s; opacity: 0.9; }
        .star:nth-child(2) { top: 25%; right: 12%; width: 10px; height: 10px; animation-delay: 0.4s; opacity: 0.7; }
        .star:nth-child(3) { bottom: 30%; left: 6%; width: 18px; height: 18px; animation-delay: 0.8s; opacity: 0.8; }
        .star:nth-child(4) { bottom: 15%; right: 8%; width: 12px; height: 12px; animation-delay: 1.2s; opacity: 0.6; }
        .star:nth-child(5) { top: 50%; left: 20%; width: 8px; height: 8px; animation-delay: 0.2s; opacity: 0.5; }
        .star:nth-child(6) { top: 60%; right: 25%; width: 16px; height: 16px; animation-delay: 0.6s; opacity: 0.7; }
        .star:nth-child(7) { top: 10%; left: 50%; width: 20px; height: 20px; animation-delay: 1.0s; opacity: 0.4; }
        .star:nth-child(8) { bottom: 40%; right: 5%; width: 9px; height: 9px; animation-delay: 0.3s; opacity: 0.8; }
        .star:nth-child(9) { top: 75%; left: 40%; width: 11px; height: 11px; animation-delay: 0.9s; opacity: 0.5; }
        .star:nth-child(10) { top: 5%; right: 30%; width: 7px; height: 7px; animation-delay: 0.1s; opacity: 0.9; }

        @keyframes sparkle {
            0% { opacity: 0.3; transform: scale(0.9) rotate(0deg); }
            100% { opacity: 1.0; transform: scale(1.2) rotate(180deg); }
        }

        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        }

        .card-title {
            font-size: 34px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #b0c4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(100, 150, 255, 0.3);
            margin-top: 12px;
        }

        .card-effect {
            font-size: 20px;
            font-weight: 400;
            line-height: 1.5;
            color: #d0dcff;
            background: rgba(0, 0, 0, 0.35);
            padding: 14px 18px;
            border-radius: 16px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            max-width: 90%;
            margin-bottom: 16px;
        }

        .card-rarity {
            font-size: 15px;
            letter-spacing: 2px;
            color: #ffd700;
            text-transform: uppercase;
            background: rgba(255, 215, 0, 0.12);
            padding: 4px 16px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.2);
            margin-bottom: 8px;
        }

        .card-footer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            width: 100%;
        }

        .card-type {
            font-size: 13px;
            color: #8899cc;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="stars">
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
            <div class="star"></div>
        </div>
        <div class="card-content">
            <div class="card-title">Вольная ставка</div>
            <div class="card-effect">Даёт возможность поставить карту без условий</div>
            <div class="card-footer">
                <div class="card-rarity">★ Нереальная</div>
                <div class="card-type">Заклинание</div>
            </div>
        </div>
    </div>
</body>
</html>
