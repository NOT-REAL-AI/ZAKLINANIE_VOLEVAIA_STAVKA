<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Карты заклинаний — Нереальные</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #1a1a2e;
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', 'Arial', sans-serif;
            padding: 40px;
        }

        /* БАЗОВАЯ КАРТА */
        .card {
            width: 320px;
            height: 480px;
            border-radius: 24px;
            padding: 30px 24px 24px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0f2a 0%, #1a2a6a 50%, #2b4a8a 100%);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.8), 0 0 60px rgba(30, 60, 180, 0.3);
            border: 2px solid rgba(100, 160, 255, 0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: scale(1.03);
        }

        /* ЗВЁЗДЫ (ФОН) */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        .star {
            position: absolute;
            background: white;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            opacity: 0.25;
            animation: sparkle 3s infinite alternate ease-in-out;
        }
        @keyframes sparkle {
            0% { opacity: 0.15; transform: scale(0.9) rotate(0deg); }
            100% { opacity: 0.5; transform: scale(1.3) rotate(180deg); }
        }

        /* КОНТЕНТ */
        .card-content {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            text-shadow: 0 2px 12px rgba(0, 0, 0, 0.7);
        }

        /* НАЗВАНИЕ — голубой градиент */
        .card-title {
            font-size: 38px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(180deg, #a0d0ff 0%, #4a8aff 50%, #1a5ac0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(60, 140, 255, 0.3);
            margin-top: 20px;
            line-height: 1.2;
        }

        /* ЭФФЕКТ — под названием */
        .card-effect {
            font-size: 20px;
            font-weight: 300;
            color: #c0d8ff;
            background: rgba(0, 0, 0, 0.25);
            padding: 10px 18px;
            border-radius: 40px;
            backdrop-filter: blur(2px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            margin-top: 20px;
            max-width: 90%;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        /* РЕДКОСТЬ */
        .card-rarity {
            font-size: 14px;
            letter-spacing: 2px;
            color: #ffd700;
            text-transform: uppercase;
            background: rgba(255, 215, 0, 0.08);
            padding: 4px 18px;
            border-radius: 40px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            margin-top: auto;
            margin-bottom: 8px;
        }
        .card-type {
            font-size: 12px;
            color: #8899cc;
            letter-spacing: 1px;
            margin-bottom: 4px;
        }

        /* ГРИД ДЛЯ КАРТ */
        .cards-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body>
    <div class="cards-grid">

        <!-- ===== КАРТА 1: ВОЛЬНАЯ СТАВКА ===== -->
        <div class="card">
            <div class="stars">
                <div class="star" style="top:8%; left:5%; width:20px; height:20px; animation-delay:0s;"></div>

                <div class="star" style="top:20%; left:70%; width:18px; height:18px; animation-delay:1.4s;"></div>
                <div class="star" style="top:80%; left:60%; width:22px; height:22px; animation-delay:0.7s;"></div>
                <div class="star" style="top:50%; left:80%; width:28px; height:28px; animation-delay:1.1s;"></div>

            </div>
            <div class="card-content">

                <div class="card-rarity">★ Нереальная</div>

            </div>
        </div>

        <!-- ===== КАРТА 2: ДВОЙНОЙ ХОД ===== -->
        <div class="card">
            <div class="stars">
                <div class="star" style="top:6%; left:8%; width:22px; height:22px; animation-delay:0s;"></div>

                <div class="star" style="top:88%; left:5%; width:18px; height:18px; animation-delay:1.0s;"></div>
                <div class="star" style="top:12%; left:45%; width:32px; height:32px; animation-delay:0.3s;"></div>

                <div class="star" style="top:70%; left:35%; width:36px; height:36px; animation-delay:0.5s;"></div>

                <div class="star" style="top:55%; left:85%; width:30px; height:30px; animation-delay:1.1s;"></div>
                <div class="star" style="top:8%; left:92%; width:16px; height:16px; animation-delay:0.1s;"></div>
                <div class="star" style="top:92%; left:25%; width:22px; height:22px; animation-delay:0.9s;"></div>
                <div class="star" style="top:40%; left:20%; width:18px; height:18px; animation-delay:0.6s;"></div>
                <div class="star" style="top:78%; left:50%; width:28px; height:28px; animation-delay:0.3s;"></div>
                <div class="star" style="top:65%; left:75%; width:32px; height:32px; animation-delay:1.3s;"></div>
            </div>
            <div class="card-content">
                <div class="card-title">Двойной <br>ход</div>
                <div class="card-effect">Сделай два хода подряд</div>
                <div class="card-rarity">★ Нереальная</div>
                <div class="card-type">Заклинание</div>
            </div>
        </div>

    </div>
</body>
</html>
